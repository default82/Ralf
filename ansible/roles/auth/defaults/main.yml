---
ralf_state_dir: /var/lib/ralf
ralf_root_dir: /srv/ralf

auth_config_dir: "{{ ralf_state_dir }}/auth"
auth_secrets_dir: "{{ ralf_root_dir }}/auth/secrets"
auth_service_user: authelia
auth_service_group: authelia

auth_identity_backend:
  type: ldap
  url: "ldaps://auth.homelab.lan"
  base_dn: "dc=homelab,dc=lan"
  user: "uid=authelia,ou=service,dc=homelab,dc=lan"
  password_file: "{{ auth_secrets_dir }}/ldap.pass"

auth_access_control:
  default_policy: deny
  rules:
    - domain: "portal.homelab.lan"
      policy: one_factor
    - domain: "grafana.homelab.lan"
      resources:
        - "^/api.*"
      policy: two_factor

auth_session:
  name: authelia_session
  expiration: 3600
  inactivity: 300
  domain: homelab.lan

auth_notifier:
  type: smtp
  host: "smtp.homelab.lan"
  port: 587
  username: "authelia@homelab.lan"
  password_file: "{{ auth_secrets_dir }}/smtp.pass"
  sender: "authelia@homelab.lan"

auth_totp:
  issuer: "RALF"
  period: 30
