---
- name: Validate mandatory secrets
  ansible.builtin.assert:
    that:
      - vaultwarden_db_password | length > 0
      - vaultwarden_admin_token | length > 0
    fail_msg: >-
      Required secrets for Vaultwarden are missing. Provide database credentials and
      the admin token via the secrets backend or environment variables (see role README).
    success_msg: "Vaultwarden secrets provided"

- name: Check existing TLS certificate
  ansible.builtin.stat:
    path: "{{ vaultwarden_ssl_certificate_file }}"
  register: vaultwarden_existing_cert
  when: vaultwarden_enable_ssl | bool

- name: Check existing TLS private key
  ansible.builtin.stat:
    path: "{{ vaultwarden_ssl_private_key_file }}"
  register: vaultwarden_existing_key
  when: vaultwarden_enable_ssl | bool

- name: Validate TLS inputs when SSL is enabled
  ansible.builtin.assert:
    that:
      - vaultwarden_ssl_certificate | length > 0 or vaultwarden_existing_cert.stat.exists | default(false)
      - vaultwarden_ssl_private_key | length > 0 or vaultwarden_existing_key.stat.exists | default(false)
    fail_msg: >-
      SSL support is enabled but neither inline certificate/key data nor existing files are available.
      Provide vaultwarden_ssl_certificate / vaultwarden_ssl_private_key or distribute files beforehand.
  when: vaultwarden_enable_ssl | bool

- name: Ensure Vaultwarden group exists
  ansible.builtin.group:
    name: "{{ vaultwarden_group }}"
    system: true
  when: vaultwarden_manage_user | bool

- name: Ensure Vaultwarden user exists
  ansible.builtin.user:
    name: "{{ vaultwarden_user }}"
    group: "{{ vaultwarden_group }}"
    system: true
    create_home: false
  when: vaultwarden_manage_user | bool

- name: Ensure Vaultwarden directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ vaultwarden_user if vaultwarden_manage_user else 'root' }}"
    group: "{{ vaultwarden_group if vaultwarden_manage_user else 'root' }}"
    mode: "0750"
  loop:
    - "{{ vaultwarden_base_dir }}"
    - "{{ vaultwarden_config_dir }}"
    - "{{ vaultwarden_data_dir }}"
    - "{{ vaultwarden_backup_dir }}"
  notify: Restart vaultwarden service

- name: Ensure SSL directory exists when required
  ansible.builtin.file:
    path: "{{ vaultwarden_ssl_dir }}"
    state: directory
    owner: "root"
    group: "root"
    mode: "0700"
  when: vaultwarden_enable_ssl | bool

- name: Deploy TLS certificate from secrets
  ansible.builtin.copy:
    dest: "{{ vaultwarden_ssl_certificate_file }}"
    content: "{{ vaultwarden_ssl_certificate }}"
    owner: "root"
    group: "root"
    mode: "0644"
  when:
    - vaultwarden_enable_ssl | bool
    - vaultwarden_ssl_certificate | length > 0
  notify: Restart vaultwarden service

- name: Deploy TLS private key from secrets
  ansible.builtin.copy:
    dest: "{{ vaultwarden_ssl_private_key_file }}"
    content: "{{ vaultwarden_ssl_private_key }}"
    owner: "root"
    group: "root"
    mode: "0600"
  when:
    - vaultwarden_enable_ssl | bool
    - vaultwarden_ssl_private_key | length > 0
  notify: Restart vaultwarden service

- name: Build secret environment dictionary
  ansible.builtin.set_fact:
    vaultwarden_secret_env_effective: >-
      {{ (vaultwarden_secret_env | default({}, true))
         | combine({'ADMIN_TOKEN': vaultwarden_admin_token} if vaultwarden_admin_token | length > 0 else {}) }}

- name: Compose Vaultwarden environment map
  ansible.builtin.set_fact:
    vaultwarden_env_combined: >-
      {{ vaultwarden_env_base | combine(vaultwarden_secret_env_effective) | combine(vaultwarden_env_overrides) }}

- name: Merge Vaultwarden config options
  ansible.builtin.set_fact:
    vaultwarden_config_effective: >-
      {{ vaultwarden_config_defaults | combine(vaultwarden_config_overrides, recursive=True) }}

- name: Render Vaultwarden configuration
  ansible.builtin.template:
    src: config.json.j2
    dest: "{{ vaultwarden_config_file }}"
    owner: "{{ vaultwarden_user if vaultwarden_manage_user else 'root' }}"
    group: "{{ vaultwarden_group if vaultwarden_manage_user else 'root' }}"
    mode: "0640"
  notify: Restart vaultwarden service

- name: Render Vaultwarden environment file
  ansible.builtin.template:
    src: vaultwarden.env.j2
    dest: "{{ vaultwarden_env_file }}"
    owner: "{{ vaultwarden_user if vaultwarden_manage_user else 'root' }}"
    group: "{{ vaultwarden_group if vaultwarden_manage_user else 'root' }}"
    mode: "0640"
  notify: Restart vaultwarden service

- name: Build compose volume list
  ansible.builtin.set_fact:
    vaultwarden_compose_volumes: >-
      {{ [vaultwarden_data_dir ~ ':/data', vaultwarden_config_file ~ ':/data/config.json:ro']
         + ([vaultwarden_ssl_certificate_file ~ ':' ~ vaultwarden_ssl_container_cert_file ~ ':ro',
             vaultwarden_ssl_private_key_file ~ ':' ~ vaultwarden_ssl_container_key_file ~ ':ro']
            if vaultwarden_enable_ssl | bool else [])
         + vaultwarden_additional_volumes }}

- name: Render Vaultwarden docker-compose definition
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ vaultwarden_compose_file }}"
    owner: "{{ vaultwarden_user if vaultwarden_manage_user else 'root' }}"
    group: "{{ vaultwarden_group if vaultwarden_manage_user else 'root' }}"
    mode: "0640"
  notify:
    - Reload systemd
    - Restart vaultwarden service

- name: Render backup script
  ansible.builtin.template:
    src: backup.sh.j2
    dest: "{{ vaultwarden_backup_script }}"
    owner: "root"
    group: "root"
    mode: "0750"
  notify: Restart vaultwarden backup timer

- name: Deploy Vaultwarden systemd service unit
  ansible.builtin.template:
    src: vaultwarden.service.j2
    dest: "/etc/systemd/system/vaultwarden.service"
    owner: "root"
    group: "root"
    mode: "0644"
  when: vaultwarden_manage_systemd | bool
  notify:
    - Reload systemd
    - Restart vaultwarden service

- name: Deploy Vaultwarden backup service unit
  ansible.builtin.template:
    src: vaultwarden-backup.service.j2
    dest: "/etc/systemd/system/vaultwarden-backup.service"
    owner: "root"
    group: "root"
    mode: "0644"
  when: vaultwarden_manage_systemd | bool
  notify:
    - Reload systemd
    - Restart vaultwarden backup timer

- name: Deploy Vaultwarden backup timer unit
  ansible.builtin.template:
    src: vaultwarden-backup.timer.j2
    dest: "/etc/systemd/system/vaultwarden-backup.timer"
    owner: "root"
    group: "root"
    mode: "0644"
  when: vaultwarden_manage_systemd | bool
  notify:
    - Reload systemd
    - Restart vaultwarden backup timer

- name: Ensure Vaultwarden service is enabled
  ansible.builtin.systemd:
    name: vaultwarden.service
    enabled: true
    state: started
  when: vaultwarden_manage_systemd | bool

- name: Ensure Vaultwarden backup timer is enabled
  ansible.builtin.systemd:
    name: vaultwarden-backup.timer
    enabled: true
    state: started
  when: vaultwarden_manage_systemd | bool
