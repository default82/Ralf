---
# Default variables for vaultwarden
vaultwarden_manage_user: true
vaultwarden_manage_systemd: true
vaultwarden_user: "vaultwarden"
vaultwarden_group: "vaultwarden"

vaultwarden_docker_binary: "/usr/bin/docker"
vaultwarden_image: "vaultwarden/server:1.30.5-alpine"
vaultwarden_compose_version: "3.9"
vaultwarden_container_name: "vaultwarden"

vaultwarden_base_dir: "/srv/vaultwarden"
vaultwarden_config_dir: "{{ vaultwarden_base_dir }}/config"
vaultwarden_data_dir: "{{ vaultwarden_base_dir }}/data"
vaultwarden_backup_dir: "{{ vaultwarden_base_dir }}/backups"
vaultwarden_ssl_dir: "{{ vaultwarden_base_dir }}/ssl"
vaultwarden_env_file: "{{ vaultwarden_base_dir }}/vaultwarden.env"
vaultwarden_compose_file: "{{ vaultwarden_base_dir }}/docker-compose.yml"
vaultwarden_config_file: "{{ vaultwarden_config_dir }}/config.json"
vaultwarden_backup_script: "{{ vaultwarden_base_dir }}/vaultwarden-backup.sh"

vaultwarden_timezone: "Etc/UTC"
vaultwarden_bind_address: "0.0.0.0"
vaultwarden_internal_port: 80
vaultwarden_http_port: 10301
vaultwarden_domain: "vaultwarden.local"
vaultwarden_signups_allowed: false
vaultwarden_workers: 4
vaultwarden_log_level: "info"
vaultwarden_icon_cache_ttl: 86400
vaultwarden_show_password_hint: false
vaultwarden_enable_2fa_remember: true
vaultwarden_enable_websockets: true

vaultwarden_enable_ssl: false
vaultwarden_ssl_certificate_file: "{{ vaultwarden_ssl_dir }}/vaultwarden.crt"
vaultwarden_ssl_private_key_file: "{{ vaultwarden_ssl_dir }}/vaultwarden.key"
vaultwarden_ssl_certificate: ""
vaultwarden_ssl_private_key: ""
vaultwarden_ssl_container_cert_file: "/ssl/tls.crt"
vaultwarden_ssl_container_key_file: "/ssl/tls.key"

vaultwarden_db_scheme: "postgresql"
vaultwarden_db_host: "postgresql01"
vaultwarden_db_port: 5432
vaultwarden_db_name: "vaultwarden"
vaultwarden_db_user: "vaultwarden"
vaultwarden_db_password: "{{ lookup('ansible.builtin.env', 'VAULTWARDEN_DB_PASSWORD') | default('', true) }}"
vaultwarden_db_sslmode: "require"

vaultwarden_admin_token: "{{ lookup('ansible.builtin.env', 'VAULTWARDEN_ADMIN_TOKEN') | default('', true) }}"

vaultwarden_additional_ports: []
vaultwarden_additional_volumes: []
vaultwarden_labels: {}
vaultwarden_env_overrides: {}
vaultwarden_secret_env: {}
vaultwarden_config_overrides: {}
vaultwarden_compose_extra: {}

vaultwarden_backup_retention: 7
vaultwarden_backup_oncalendar: "daily"

vaultwarden_database_url: >-
  {{ vaultwarden_db_scheme }}://{{ vaultwarden_db_user }}:{{ vaultwarden_db_password }}@{{ vaultwarden_db_host }}:{{ vaultwarden_db_port }}/{{ vaultwarden_db_name }}{% if vaultwarden_db_sslmode | length > 0 %}?sslmode={{ vaultwarden_db_sslmode }}{% endif %}

vaultwarden_rocket_tls: >-
  {{ '{certs="' ~ vaultwarden_ssl_container_cert_file ~ '",key="' ~ vaultwarden_ssl_container_key_file ~ '"}' if vaultwarden_enable_ssl | bool else '' }}

vaultwarden_env_base:
  DATA_FOLDER: "/data"
  DATABASE_URL: "{{ vaultwarden_database_url }}"
  DOMAIN: "{{ vaultwarden_domain }}"
  ROCKET_ADDRESS: "{{ vaultwarden_bind_address }}"
  ROCKET_PORT: "{{ vaultwarden_internal_port }}"
  SIGNUPS_ALLOWED: "{{ 'true' if vaultwarden_signups_allowed | bool else 'false' }}"
  TZ: "{{ vaultwarden_timezone }}"
  WEBSOCKET_ENABLED: "{{ 'true' if vaultwarden_enable_websockets | bool else 'false' }}"
  ROCKET_TLS: "{{ vaultwarden_rocket_tls }}"

vaultwarden_config_defaults:
  log_level: "{{ vaultwarden_log_level }}"
  icon_cache_ttl: {{ vaultwarden_icon_cache_ttl }}
  show_password_hint: {{ vaultwarden_show_password_hint | bool }}
  enable_2fa_remember: {{ vaultwarden_enable_2fa_remember | bool }}
  rocket_workers: {{ vaultwarden_workers }}
