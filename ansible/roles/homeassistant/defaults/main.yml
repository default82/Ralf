---
ralf_root_dir: /srv/ralf
ralf_state_dir: /var/lib/ralf

homeassistant_config_dir: "{{ ralf_state_dir }}/homeassistant"
homeassistant_secrets_file: "{{ homeassistant_config_dir }}/secrets.yaml"
homeassistant_http:
  base_url: "https://ha.homelab.lan"
  use_x_forwarded_for: true
  trusted_proxies:
    - "10.23.20.10"

homeassistant_integrations:
  - name: prometheus
    options:
      listen_port: 9617
  - name: influxdb
    options:
      host: "influxdb.homelab.lan"
      port: 8086
      database: homeassistant
      username: ha
      password: "!secret influxdb_password"

homeassistant_automations: []

homeassistant_secrets:
  influxdb_password: "CHANGEME"
  notifier_webhook: "https://matrix-bot.homelab.lan/hooks/ha"
