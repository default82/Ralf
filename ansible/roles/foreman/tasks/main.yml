---
- name: Install Foreman packages
  ansible.builtin.package:
    name: "{{ foreman_packages }}"
    state: present
  when: foreman_packages | length > 0

- name: Ensure Foreman configuration directory exists
  ansible.builtin.file:
    path: "{{ foreman_config_path | dirname }}"
    state: directory
    owner: "{{ foreman_user }}"
    group: "{{ foreman_group }}"
    mode: '0755'

- name: Deploy Foreman configuration
  ansible.builtin.template:
    src: settings.yaml.j2
    dest: "{{ foreman_config_path }}"
    owner: "{{ foreman_user }}"
    group: "{{ foreman_group }}"
    mode: '0644'
