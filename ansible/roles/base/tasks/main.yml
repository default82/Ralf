---
- name: Ensure base directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    mode: "{{ item.mode | default('0755') }}"
  loop: "{{ base_directories }}"

- name: Install base packages
  ansible.builtin.package:
    name: "{{ base_packages }}"
    state: present
  when: base_packages | length > 0

- name: Configure sysctl defaults
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    reload: true
  loop: "{{ base_sysctl | dict2items }}"
  when: base_sysctl | length > 0

- name: Deploy RALF profile banner
  ansible.builtin.copy:
    dest: /etc/motd.d/ralf
    content: |
      {{ base_motd_header | trim }}
    owner: root
    group: root
    mode: "0644"

- name: Install RALF shell aliases
  ansible.builtin.copy:
    dest: /etc/profile.d/ralf.sh
    content: |
      # Generated by the RALF base role
      {% for key, value in base_shell_aliases | dictsort %}
      alias {{ key }}='{{ value }}'
      {% endfor %}
    owner: root
    group: root
    mode: "0644"
  when: base_shell_aliases | length > 0
