    upstream: "http://10.23.20.20:8080"
    tls_internal: false
    headers:
      Strict-Transport-Security: "max-age=31536000; includeSubDomains; preload"
  - host: "grafana.homelab.lan"
    upstream: "http://10.23.20.60:3000"
    tls_internal: false

caddy_additional_snippets: []
