---
- name: Ensure Caddy directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ caddy_config_dir }}"
    - "{{ caddy_data_dir }}"
    - "{{ caddy_acme_dir }}"

- name: Render Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: "{{ caddy_config_dir }}/Caddyfile"
    owner: root
    group: root
    mode: "0644"

- name: Document site inventory
  ansible.builtin.copy:
    dest: "{{ caddy_config_dir }}/sites.yaml"
    content: "{{ caddy_sites | to_nice_yaml }}\n"
    owner: root
    group: root
    mode: "0644"
