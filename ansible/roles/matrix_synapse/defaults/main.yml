---
ralf_root_dir: /srv/ralf
ralf_state_dir: /var/lib/ralf

matrix_synapse_version: latest
matrix_synapse_postgres_host: localhost
matrix_synapse_postgres_port: 5432
matrix_synapse_postgres_db: synapse
matrix_synapse_postgres_user: synapse
matrix_synapse_postgres_password_file: "{{ ralf_state_dir }}/matrix-synapse/db.pass"

matrix_synapse_config_dir: "{{ ralf_state_dir }}/matrix-synapse"
matrix_synapse_media_dir: "{{ ralf_root_dir }}/matrix-synapse/media"
matrix_synapse_log_config: matrix.log.config
matrix_synapse_registration_shared_secret_file: "{{ matrix_synapse_config_dir }}/registration.secret"
matrix_synapse_macaroon_secret_file: "{{ matrix_synapse_config_dir }}/macaroon.secret"

matrix_synapse_server_name: "matrix.homelab.lan"
matrix_synapse_public_baseurl: "https://matrix.homelab.lan"
matrix_synapse_admin_user: "matrix-admin"
matrix_synapse_enable_bot: true
matrix_synapse_bot_display_name: "RALF Bot"
matrix_synapse_bot_localpart: "ralf-bot"
matrix_synapse_admin_manifest:
  admin_user: "{{ matrix_synapse_admin_user }}"
  enable_bot: "{{ matrix_synapse_enable_bot }}"
  bot_localpart: "{{ matrix_synapse_bot_localpart }}"
  bot_display_name: "{{ matrix_synapse_bot_display_name }}"

matrix_synapse_turn:
  enabled: false
  uris: []
  shared_secret_file: "{{ matrix_synapse_config_dir }}/turn.secret"

matrix_synapse_caddy_site:
  host: "matrix.homelab.lan"
  upstream: "http://matrix-synapse:8008"
  tls_internal: false
  headers:
    Strict-Transport-Security: "max-age=31536000; includeSubDomains; preload"
