---
ralf_root_dir: /srv/ralf
ralf_state_dir: /var/lib/ralf

monitoring_config_dir: "{{ ralf_state_dir }}/monitoring"
monitoring_rules_dir: "{{ monitoring_config_dir }}/rules"
monitoring_dashboards_dir: "{{ monitoring_config_dir }}/dashboards"

monitoring_prometheus_global:
  scrape_interval: 30s
  evaluation_interval: 30s

monitoring_prometheus_scrape_configs:
  - job_name: node-exporter
    static_configs:
      - targets:
          - "pve0.homelab.lan:9100"
          - "pve1.homelab.lan:9100"
  - job_name: caddy
    metrics_path: /metrics
    static_configs:
      - targets:
          - "caddy.homelab.lan:2019"

monitoring_alertmanager_receivers:
  - name: ops-email
    email_configs:
      - to: "admin@homelab.lan"
        send_resolved: true
  - name: matrix-room
    webhook_configs:
      - url: "https://matrix-bot.homelab.lan/hooks/alerts"

monitoring_alertmanager_route:
  receiver: ops-email
  routes:
    - match:
        severity: critical
      receiver: matrix-room

monitoring_dashboards:
  - name: host-overview
    uid: host-overview
    folder: "RALF"
    description: "Baseline compute and storage metrics"
    tags:
      - infrastructure

monitoring_recording_rules: []
