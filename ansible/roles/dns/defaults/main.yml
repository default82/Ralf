---
ralf_root_dir: /srv/ralf
ralf_state_dir: /var/lib/ralf

dns_service_user: coredns
dns_service_group: coredns
dns_config_dir: "{{ ralf_state_dir }}/dns"
dns_runtime_dir: "{{ ralf_root_dir }}/dns"

dns_manifest:
  service: coredns
  listen: "0.0.0.0:53"
  protocol: udp
  upstreams:
    - 1.1.1.1
    - 9.9.9.9
  logging: true
  metrics: true

dns_zones:
  - name: "homelab.lan"
    ttl: 3600
    records:
      - type: A
        name: "portal"
        value: "10.23.20.20"
      - type: A
        name: "matrix"
        value: "10.23.20.30"
      - type: CNAME
        name: "grafana"
        value: "monitoring"
  - name: "23.10.23.10.in-addr.arpa"
    ttl: 3600
    records:
      - type: PTR
        name: "2"
        value: "pve0.homelab.lan."

dns_zone_mode: yaml
