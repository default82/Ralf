---
- name: Install unzip dependency
  ansible.builtin.apt:
    name: unzip
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Download OpenTofu archive
  ansible.builtin.get_url:
    url: "{{ opentofu_download_url }}"
    dest: "/tmp/tofu_{{ opentofu_version }}.zip"
    mode: '0644'

- name: Unarchive OpenTofu binary
  ansible.builtin.unarchive:
    src: "/tmp/tofu_{{ opentofu_version }}.zip"
    dest: /tmp
    remote_src: true
    creates: "/tmp/tofu"

- name: Install OpenTofu binary
  ansible.builtin.copy:
    src: /tmp/tofu
    dest: "{{ opentofu_install_path }}"
    owner: root
    group: root
    mode: '0755'
    remote_src: true

- name: Verify OpenTofu installation
  ansible.builtin.command: "{{ opentofu_install_path }} version"
  register: tofu_version_output
  changed_when: false
