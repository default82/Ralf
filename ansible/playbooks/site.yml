---
- name: Configure control plane host
  hosts: mgmt
  gather_facts: true
  roles:
    - role: common
    - role: opentofu_cli
    - role: ralf_cli
    - role: borgmatic

- name: Configure PostgreSQL service
  hosts: svc-postgres
  gather_facts: true
  roles:
    - role: common
    - role: postgresql
    - role: borgmatic

- name: Configure Semaphore UI
  hosts: svc-semaphore
  gather_facts: true
  roles:
    - role: common
    - role: semaphore
    - role: borgmatic

- name: Configure Foreman Core
  hosts: svc-foreman
  gather_facts: true
  roles:
    - role: common
    - role: foreman
    - role: borgmatic

- name: Configure n8n automation
  hosts: svc-n8n
  gather_facts: true
  roles:
    - role: common
    - role: n8n
    - role: borgmatic

- name: Configure Vaultwarden secrets manager
  hosts: svc-vaultwarden
  gather_facts: true
  roles:
    - role: common
    - role: vaultwarden
    - role: borgmatic
