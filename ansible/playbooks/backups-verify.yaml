---
- name: Validate encrypted backup restore
  hosts: backups
  become: true
  gather_facts: false
  tasks:
    - name: Run backup restore check
      ansible.builtin.command: "/usr/local/sbin/ralf-verify-backups"
      register: verify
      changed_when: false

    - name: Assert restore succeeded
      ansible.builtin.assert:
        that:
          - verify.rc == 0
        fail_msg: "Backup restore validation failed"
        success_msg: "Backups verified successfully"
