---
all:
  vars:
    ansible_user: ubuntu
    ansible_become: true
    domain_name: "{{ lookup('vars', 'ralf_domain', default='home.arpa') }}"
    postgres_host: "svc-postgres.{{ domain_name }}"
  children:
    mgmt:
      hosts:
        ralf-lxc:
          ansible_host: "{{ hostvars['ralf-lxc'].get('ip_address', 'VAR_RALF_LXC_IP') }}"
          ip_address: "{{ lookup('vars', 'ralf_lxc_ip', default='VAR_RALF_LXC_IP') }}"
          ctid: "{{ lookup('vars', 'ralf_lxc_ctid', default='VAR_RALF_LXC_CTID') }}"
    db:
      hosts:
        svc-postgres:
          ansible_host: "{{ hostvars['svc-postgres'].get('ip_address', 'VAR_POSTGRES_IP') }}"
          ip_address: "{{ lookup('vars', 'postgres_ip', default='VAR_POSTGRES_IP') }}"
          ctid: "{{ lookup('vars', 'postgres_ctid', default='VAR_POSTGRES_CTID') }}"
    apps:
      children:
        semaphore:
          hosts:
            svc-semaphore:
              ansible_host: "{{ lookup('vars', 'semaphore_ip', default='VAR_SEMAPHORE_IP') }}"
              ip_address: "{{ lookup('vars', 'semaphore_ip', default='VAR_SEMAPHORE_IP') }}"
              ctid: "{{ lookup('vars', 'semaphore_ctid', default='VAR_SEMAPHORE_CTID') }}"
        foreman:
          hosts:
            svc-foreman:
              ansible_host: "{{ lookup('vars', 'foreman_ip', default='VAR_FOREMAN_IP') }}"
              ip_address: "{{ lookup('vars', 'foreman_ip', default='VAR_FOREMAN_IP') }}"
              ctid: "{{ lookup('vars', 'foreman_ctid', default='VAR_FOREMAN_CTID') }}"
        n8n:
          hosts:
            svc-n8n:
              ansible_host: "{{ lookup('vars', 'n8n_ip', default='VAR_N8N_IP') }}"
              ip_address: "{{ lookup('vars', 'n8n_ip', default='VAR_N8N_IP') }}"
              ctid: "{{ lookup('vars', 'n8n_ctid', default='VAR_N8N_CTID') }}"
        vaultwarden:
          hosts:
            svc-vaultwarden:
              ansible_host: "{{ lookup('vars', 'vaultwarden_ip', default='VAR_VAULTWARDEN_IP') }}"
              ip_address: "{{ lookup('vars', 'vaultwarden_ip', default='VAR_VAULTWARDEN_IP') }}"
              ctid: "{{ lookup('vars', 'vaultwarden_ctid', default='VAR_VAULTWARDEN_CTID') }}"
