logging:
  enabled: true
  level: INFO
  log_file: /var/log/ralf/ralf.log
  max_bytes: 5242880  # 5 MB
  backup_count: 5
  release_mode: false

paths:
  state_dir: /var/lib/ralf
  cache_dir: /var/cache/ralf

bootstrap:
  steps:
    - name: environment-check
      description: "Prüft grundlegende Hostvoraussetzungen und meldet Ergebnisse."
    - name: prepare-directories
      description: "Erstellt Arbeits- und Cacheverzeichnisse basierend auf der Konfiguration."
    - name: inventory-placeholder
      description: "Reservierter Schritt für spätere Inventur- und Netzwerkerkennung."
    - name: summary
      description: "Fasst alle Protokolle des Laufs zusammen."
